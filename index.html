<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITORING SYSTEM - Mr.Akkarapon</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #0056b3; --secondary: #66deff; --bg: #f8f9fa; --success: #2ed573; --danger: #ff4757; --warning: #ffa502; }
        * { box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        body { background-color: var(--bg); margin: 0; padding: 10px; }
        .dashboard-container { max-width: 1200px; margin: auto; }
        
        .main-header { 
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; padding: 15px; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 20px;
        }
        .status-container { display: flex; gap: 15px; font-size: 0.9rem; margin-top: 10px; }
        .status-item { background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px; display: flex; align-items: center; gap: 8px; }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; }
        .dot-green { background-color: var(--success); box-shadow: 0 0 8px var(--success); }
        .dot-red { background-color: var(--danger); box-shadow: 0 0 8px var(--danger); }
        
        .card { 
            background: white; border-radius: 20px; padding: 25px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); margin-bottom: 15px; 
            position: relative; overflow: hidden; border: 2px solid #eee;
        }
        .card-title { font-size: 1.2rem; font-weight: 600; color: var(--primary); margin-bottom: 15px; border-bottom: 2px solid var(--bg); padding-bottom: 10px; position: relative; z-index: 10; }

        /* Wave Animation */
        .wave-wrapper { position: absolute; width: 100%; height: 80px; bottom: 0; left: 0; z-index: 1; pointer-events: none; }
        .waves { position: relative; width: 100%; height: 100%; }
        .water-wave use { animation: move-forever 10s cubic-bezier(.55,.5,.45,.5) infinite; fill: rgba(102, 222, 255, 0.4); }
        .bat-wave use { animation: move-forever 8s cubic-bezier(.55,.5,.45,.5) infinite; fill: rgba(255, 165, 2, 0.3); }
        @keyframes move-forever { 0% { transform: translate3d(-90px,0,0); } 100% { transform: translate3d(85px,0,0); } }

        .current-num { font-size: 3.8rem; font-weight: 800; color: var(--primary); text-align: center; position: relative; z-index: 10; margin: 10px 0; line-height: 1; }
        .bat-num { color: #d35400; }
        .unit { font-size: 1.2rem; color: #666; font-weight: 400; }
        .time-label { text-align: center; font-size: 0.85rem; color: #888; position: relative; z-index: 10; }

        .grid-layout { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 992px) { .grid-layout { grid-template-columns: 1fr 1fr; } }
        .chart-container { position: relative; height: 300px; width: 100%; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 10px; }
        th, td { padding: 10px; text-align: center; border-bottom: 1px solid #eee; }
        .btn-page { background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        footer { text-align: center; padding: 20px; color: #888; font-size: 0.9rem; }
        select { padding: 8px 12px; border-radius: 8px; border: 1px solid #ddd; outline: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <header class="main-header">
        <h1 style="margin:0; font-size: 1.5rem;">WATER & BATTERY MONITORING SYSTEM</h1>
        <div class="status-container">
            <div class="status-item"><span id="mqtt-dot" class="dot dot-red"></span> MQTT: <span id="mqtt-text">เชื่อมต่อ...</span></div>
            <div class="status-item"><span id="device-dot" class="dot dot-red"></span> Device: <span id="device-text">ออฟไลน์</span></div>
        </div>
    </header>

    <div class="card">
        <span>เลือกช่วงเวลา: </span>
        <select id="timeFilter" onchange="loadAllData()">
            <option value="0.02083" selected>ย้อนหลัง 30 นาที</option>
            <option value="0.04167">ย้อนหลัง 1 ชั่วโมง</option>
            <option value="0.125">ย้อนหลัง 3 ชั่วโมง</option>
            <option value="1">ย้อนหลัง 1 วัน</option>
            <option value="3">ย้อนหลัง 3 วัน</option>
            <option value="7">ย้อนหลัง 7 วัน</option>
        </select>
    </div>

    <div class="grid-layout">
        <div class="card">
            <div class="card-title">💧 ระดับน้ำปัจจุบัน</div>
            <div class="current-num"><span id="val-display">0.00</span> <span class="unit">m</span></div>
            <p id="time-display" class="time-label">รอข้อมูล...</p>
            <div class="wave-wrapper">
                <svg class="waves water-wave" xmlns="http://www.w3.org/2000/svg" viewBox="0 24 150 28" preserveAspectRatio="none">
                    <defs><path id="w-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" /></defs>
                    <g class="parallax"><use href="#w-wave" x="48" y="0" /><use href="#w-wave" x="48" y="5" /></g>
                </svg>
            </div>
        </div>

        <div class="card">
            <div class="card-title">🔋 แบตเตอรี่ปัจจุบัน</div>
            <div class="current-num bat-num"><span id="bat-display">0.00</span> <span class="unit">V</span></div>
            <p id="bat-time-display" class="time-label">รอข้อมูล...</p>
            <div class="wave-wrapper">
                <svg class="waves bat-wave" xmlns="http://www.w3.org/2000/svg" viewBox="0 24 150 28" preserveAspectRatio="none">
                    <defs><path id="b-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" /></defs>
                    <g class="parallax"><use href="#b-wave" x="48" y="0" /><use href="#b-wave" x="48" y="5" /></g>
                </svg>
            </div>
        </div>
    </div>

    <div class="grid-layout">
        <div class="card">
            <div class="card-title">📈 กราฟระดับน้ำ</div>
            <div class="chart-container"><canvas id="waterChart"></canvas></div>
        </div>
        <div class="card">
            <div class="card-title">⚡ กราฟแบตเตอรี่</div>
            <div class="chart-container"><canvas id="batteryChart"></canvas></div>
        </div>
    </div>

    <div class="grid-layout">
        <div class="card">
            <div class="card-title">📋 ประวัติระดับน้ำ</div>
            <table><thead><tr><th>เวลา</th><th>ค่า (m)</th></tr></thead><tbody id="water-table-body"></tbody></table>
            <div style="text-align:center; margin-top:10px;">
                <button class="btn-page" id="waterPrev" onclick="changePage('water', -1)">ก่อนหน้า</button>
                <span id="waterPageInfo" style="font-size:0.8rem; margin:0 10px;"></span>
                <button class="btn-page" id="waterNext" onclick="changePage('water', 1)">ถัดไป</button>
            </div>
        </div>
        <div class="card">
            <div class="card-title">📋 ประวัติแบตเตอรี่</div>
            <table><thead><tr><th>เวลา</th><th>ค่า (V)</th></tr></thead><tbody id="bat-table-body"></tbody></table>
            <div style="text-align:center; margin-top:10px;">
                <button class="btn-page" id="batPrev" onclick="changePage('bat', -1)">ก่อนหน้า</button>
                <span id="batPageInfo" style="font-size:0.8rem; margin:0 10px;"></span>
                <button class="btn-page" id="batNext" onclick="changePage('bat', 1)">ถัดไป</button>
            </div>
        </div>
    </div>

    <footer>Developed by Mr.Akkarapon RF Application</footer>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDEuTlsftqeh8_5GnVCTJVq09a0UKwOpVg",
        authDomain: "waterlevel-project-c9022.firebaseapp.com",
        databaseURL: "https://waterlevel-project-c9022-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "waterlevel-project-c9022",
        storageBucket: "waterlevel-project-c9022.firebasestorage.app",
        messagingSenderId: "146995523873",
        appId: "1:146995523873:web:4b814d920d9b16bf2d8e60"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const HOST = "ddf77777.ala.asia-southeast1.emqxsl.com";
    const PORT = 8084;
    const TOPIC_WATER = "water/001/data";
    const TOPIC_BAT = "water/001/bat";
    const USER = "guybroker";
    const PASS = "P@ssw0rd";

    const ROWS_PER_PAGE = 10;
    let waterData = [], batData = [];
    let waterPage = 1, batPage = 1;
    let lastBatTime = null;

    const client = new Paho.MQTT.Client(HOST, PORT, "web_mhoo_" + Math.random().toString(16).substr(2, 5));

    function initChart(id, label, color, bg) {
        return new Chart(document.getElementById(id).getContext('2d'), {
            type: 'line',
            data: { datasets: [{ label: label, data: [], borderColor: color, backgroundColor: bg, fill: true, tension: 0.3, spanGaps: true }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { x: { type: 'time', time: { unit: 'minute' } } } }
        });
    }
    const waterChart = initChart('waterChart', 'ระดับน้ำ (m)', '#0056b3', 'rgba(102, 222, 255, 0.2)');
    const batteryChart = initChart('batteryChart', 'แบตเตอรี่ (V)', '#ffa502', 'rgba(255, 165, 2, 0.1)');

    function loadAllData() {
        const days = parseFloat(document.getElementById('timeFilter').value);
        const startTime = Date.now() - (days * 24 * 60 * 60 * 1000);
        const unit = (days <= 0.125) ? 'minute' : 'hour';

        [waterChart, batteryChart].forEach(c => {
            c.options.scales.x.time.unit = unit;
            c.options.scales.x.min = startTime;
            c.options.scales.x.max = Date.now();
        });

        waterPage = 1; batPage = 1;

        database.ref('water_levels').off();
        database.ref('water_levels').orderByChild('timestamp').startAt(startTime).on('value', snap => {
            waterData = snap.val() ? Object.values(snap.val()).sort((a,b)=>b.timestamp-a.timestamp) : [];
            if(waterData.length > 0) {
                document.getElementById('val-display').innerText = waterData[0].val.toFixed(2);
                document.getElementById('time-display').innerText = "ล่าสุด: " + waterData[0].fullTime;
                waterChart.data.datasets[0].data = [...waterData].sort((a,b)=>a.timestamp-b.timestamp).map(i => ({x: i.timestamp, y: i.val}));
                waterChart.update('none');
                renderTable('water');
            }
        });

        database.ref('battery_levels').off();
        database.ref('battery_levels').orderByChild('timestamp').startAt(startTime).on('value', snap => {
            batData = snap.val() ? Object.values(snap.val()).sort((a,b)=>b.timestamp-a.timestamp) : [];
            if(batData.length > 0) {
                document.getElementById('bat-display').innerText = batData[0].val.toFixed(2);
                document.getElementById('bat-time-display').innerText = "ล่าสุด: " + batData[0].fullTime;
                lastBatTime = batData[0].timestamp;
                batteryChart.data.datasets[0].data = [...batData].sort((a,b)=>a.timestamp-b.timestamp).map(i => ({x: i.timestamp, y: i.val}));
                batteryChart.update('none');
                renderTable('bat');
                checkDeviceStatus();
            }
        });
    }

    function renderTable(type) {
        const isWater = type === 'water';
        const data = isWater ? waterData : batData;
        const page = isWater ? waterPage : batPage;
        const tbody = document.getElementById(isWater ? 'water-table-body' : 'bat-table-body');
        tbody.innerHTML = "";
        const paginated = data.slice((page - 1) * ROWS_PER_PAGE, page * ROWS_PER_PAGE);
        tbody.innerHTML = paginated.map(i => `<tr><td>${i.fullTime}</td><td style="color:${isWater ? 'var(--primary)' : 'var(--warning)'}"><b>${i.val.toFixed(2)}</b></td></tr>`).join('');
        document.getElementById(isWater ? 'waterPageInfo' : 'batPageInfo').innerText = `หน้า ${page} / ${Math.ceil(data.length / ROWS_PER_PAGE) || 1}`;
    }

    function changePage(type, direction) {
        if (type === 'water') { waterPage += direction; renderTable('water'); }
        else { batPage += direction; renderTable('bat'); }
    }

    function checkDeviceStatus() {
        if (!lastBatTime) return;
        const isOnline = (Date.now() - lastBatTime) < 600000;
        document.getElementById('device-dot').className = isOnline ? "dot dot-green" : "dot dot-red";
        document.getElementById('device-text').innerText = isOnline ? "ออนไลน์" : "ออฟไลน์";
    }

    client.onMessageArrived = function (msg) {
        let rawVal = parseFloat(msg.payloadString.replace(/[^\d.-]/g, ''));
        if (isNaN(rawVal)) return;
        const payload = {
            val: (msg.destinationName === TOPIC_BAT) ? (rawVal / 100) : rawVal,
            fullTime: new Date().toLocaleString('th-TH'),
            timestamp: firebase.database.ServerValue.TIMESTAMP
        };
        database.ref(msg.destinationName === TOPIC_WATER ? 'water_levels' : 'battery_levels').push(payload);
    };

    client.connect({ useSSL: true, userName: USER, password: PASS, onSuccess: () => {
        document.getElementById('mqtt-dot').className = "dot dot-green";
        document.getElementById('mqtt-text').innerText = "ออนไลน์";
        client.subscribe(TOPIC_WATER); client.subscribe(TOPIC_BAT);
        loadAllData();
    }});

    setInterval(checkDeviceStatus, 30000);
</script>
</body>
</html>
